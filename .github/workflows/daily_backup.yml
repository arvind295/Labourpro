name: Daily Database Backup

on:
  schedule:
    # Runs at 02:30 AM UTC (IST 8:00 AM approx)
    - cron: '30 2 * * *'
  
  push:
    branches:
      - main
      
  workflow_dispatch:

jobs:
  run-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install supabase pandas

      - name: Run Backup Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backup_script.py

      # --- NEW STEP ADDED HERE ---
      - name: Upload Backup File to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: daily-backup-file
          # This tells GitHub to look for BOTH JSON and CSV files!
          path: |
            *.json
            *.csv
